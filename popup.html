<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      text-align: center;
      margin-bottom: 14px;
      color: #a0a0cc;
      font-weight: 500;
    }
    .speed-display {
      text-align: center;
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      margin: 10px 0;
      font-variant-numeric: tabular-nums;
    }
    .slider-container {
      padding: 8px 0 14px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #6c63ff;
      cursor: pointer;
      border: 2px solid #fff;
    }
    .labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }
    .preset-btn {
      background: #2a2a4a;
      border: 1px solid #3a3a5a;
      color: #ccc;
      padding: 8px 0;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .preset-btn:hover {
      background: #6c63ff;
      color: #fff;
      border-color: #6c63ff;
    }
    .preset-btn.active {
      background: #6c63ff;
      color: #fff;
      border-color: #8b83ff;
    }
    .controls {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .ctrl-btn {
      flex: 1;
      background: #2a2a4a;
      border: 1px solid #3a3a5a;
      color: #ccc;
      padding: 10px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: #3a3a5a; }
    .reset-btn {
      background: #3a2a2a;
      border-color: #5a3a3a;
    }
    .reset-btn:hover { background: #5a3a3a; }
    .status {
      text-align: center;
      font-size: 11px;
      color: #666;
      padding-top: 6px;
    }
    .shortcuts {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a2a4a;
      font-size: 10px;
      color: #555;
    }
    .shortcuts div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    kbd {
      background: #2a2a4a;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <h1>Media Speed Controller</h1>
  <div class="speed-display" id="speedDisplay">1.00x</div>

  <div class="slider-container">
    <input type="range" id="slider" min="0.25" max="5" step="0.05" value="1">
    <div class="labels"><span>0.25x</span><span>1x</span><span>5x</span></div>
  </div>

  <div class="presets">
    <button class="preset-btn" data-speed="0.5">0.5x</button>
    <button class="preset-btn active" data-speed="1">1x</button>
    <button class="preset-btn" data-speed="1.5">1.5x</button>
    <button class="preset-btn" data-speed="2">2x</button>
    <button class="preset-btn" data-speed="2.5">2.5x</button>
    <button class="preset-btn" data-speed="3">3x</button>
    <button class="preset-btn" data-speed="4">4x</button>
    <button class="preset-btn" data-speed="5">5x</button>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="decreaseBtn">- 0.25</button>
    <button class="ctrl-btn reset-btn" id="resetBtn">Reset</button>
    <button class="ctrl-btn" id="increaseBtn">+ 0.25</button>
  </div>

  <div class="status" id="status"></div>

  <div class="shortcuts">
    <div><span>Speed up</span><kbd>Alt + .</kbd></div>
    <div><span>Speed down</span><kbd>Alt + ,</kbd></div>
    <div><span>Reset</span><kbd>Alt + 0</kbd></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
